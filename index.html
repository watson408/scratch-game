<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>刮刮乐小游戏</title>
  <style>
    :root {
      --yellow: #ffd84d;
      --yellow-strong: #ffcd1a;
      --white: #ffffff;
      --text: #222;
      --success: #0f9d58;
      --fail: #c0392b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient( circle at 20% 20%, #fff7cc, #fff),
                  linear-gradient(180deg, #fff 0%, #fff7cc 100%);
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 92vw);
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(0,0,0,.08);
      overflow: hidden;
      border: 3px solid var(--yellow);
    }

    header {
      background: linear-gradient(180deg, var(--yellow) 0%, var(--yellow-strong) 100%);
      color: #5b4100;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: .5px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button.restart {
      appearance: none;
      border: none;
      background: #fff;
      color: #7a5a00;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      box-shadow: 0 3px 0 rgba(0,0,0,.08);
      cursor: pointer;
      transition: transform .05s ease, box-shadow .05s ease;
      border: 2px solid rgba(0,0,0,0.05);
    }
    button.restart:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,.08);} 

    main { padding: 18px 20px 24px; }

    .hint {
      margin: 0 0 14px;
      color: #6b6b6b;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .tile {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background: var(--yellow);
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, box-shadow .12s ease, background .2s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
      border: 2px solid rgba(0,0,0,.06);
      overflow: hidden;
    }
    .tile:hover { transform: translateY(-2px); box-shadow: 0 10px 18px rgba(0,0,0,.10); }
    .tile.revealed { cursor: default; filter: none; }

    .cover {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.7) 0 8px, rgba(255,255,255,.5) 8px 16px),
        linear-gradient(180deg, var(--yellow) 0%, var(--yellow-strong) 100%);
      display: grid;
      place-items: center;
      color: #5b4100;
      font-weight: 800;
      letter-spacing: .5px;
      text-shadow: 0 1px 0 rgba(255,255,255,.6);
      transition: opacity .25s ease;
    }

    .tile.revealed .cover { opacity: 0; pointer-events: none; }

    .result {
      position: relative;
      z-index: 0;
      font-weight: 800;
      font-size: clamp(18px, 3.5vw, 28px);
      color: var(--white);
      text-shadow: 0 2px 6px rgba(0,0,0,.25);
    }

    .tile.win { background: #ffdf70; }
    .tile.lose { background: #fff1b8; }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ffffffcc;
      color: #7a5a00;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(0,0,0,.06);
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #9b8a4a;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>刮刮乐小游戏</h1>
      <div class="actions">
        <button class="restart" id="restartBtn" aria-label="重新开始">🔄 重新开始</button>
      </div>
    </header>

    <main>
      <p class="hint">共有 8 个方块，本轮只有 <strong>1</strong> 个中奖位置。点击任意方块揭晓结果，点击「重新开始」可随机刷新中奖位置。</p>
      <div class="grid" id="grid" role="grid" aria-label="刮刮乐方块">
        <!-- Tiles will be injected by JS -->
      </div>
      <div class="footer">配色以黄色和白色为主 · 祝你好运 🍀</div>
    </main>
  </div>

  <script>
    const GRID_SIZE = 8; // 8 tiles
    let winningIndex = -1;
    let revealedCount = 0;

    const grid = document.getElementById('grid');
    const restartBtn = document.getElementById('restartBtn');

    function shuffleWin() {
      winningIndex = Math.floor(Math.random() * GRID_SIZE);
      revealedCount = 0;
    }

    function createTile(i) {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.setAttribute('role', 'gridcell');
      tile.setAttribute('aria-label', `方块 ${i + 1}`);
      tile.type = 'button';

      const cover = document.createElement('div');
      cover.className = 'cover';
      cover.textContent = '刮一刮';

      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = `#${i + 1}`;

      const result = document.createElement('div');
      result.className = 'result';
      result.textContent = '';

      tile.appendChild(result);
      tile.appendChild(cover);
      tile.appendChild(badge);

      tile.addEventListener('click', () => reveal(tile, i));

      return tile;
    }

    function renderGrid() {
      grid.innerHTML = '';
      for (let i = 0; i < GRID_SIZE; i++) {
        grid.appendChild(createTile(i));
      }
    }

    function reveal(tile, index) {
      if (tile.classList.contains('revealed')) return;
      tile.classList.add('revealed');

      const result = tile.querySelector('.result');
      const isWin = index === winningIndex;
      result.textContent = isWin ? '🎉 中奖了!' : '未中奖';
      tile.classList.add(isWin ? 'win' : 'lose');

      // Set accessible label after reveal
      tile.setAttribute('aria-label', `方块 ${index + 1}，${isWin ? '中奖' : '未中'}`);

      revealedCount++;
    }

    function restart() {
      shuffleWin();
      renderGrid();
    }

    restartBtn.addEventListener('click', restart);

    // Init
    shuffleWin();
    renderGrid();
  </script>
</body>
</html>
